<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="description" content="Get your next meal delivered by drone." />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@200;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="delivery.css" />

    <meta charset="UTF-8" />
    <title>Drone Delivery Services LLC.</title>
  </head>
  <body>
    <!-- start the page header -->
    <header>
      <span>Drone Delivery </span>
    </header>

    <!-- start the page navigation -->
    <nav>
      <ul>
        <li><a href="index.html">About Us</a></li>
        <li class="active"><a href="delivery.html">Request a Delivery</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
    </nav>

    <!-- start the page main -->
    <main>
      <h1>Request a Delivery</h1>
      <form method="get" class="myForm" action="thanks.html">
        <fieldset>
          <legend>Customer Information</legend>

          <label>First Name*<input type="text" name="fname" required /></label>
          <label>Last Name*<input type="text" name="lname" required /></label>
          <label
            >Cell Number*<input
              type="tel"
              name="phone"
              placeholder="801-666-1234"
              required
          /></label>
        </fieldset>

        <fieldset>
          <legend>Delivery Method</legend>
          <label
            ><input
              type="radio"
              name="method"
              value="bike"
            />Bike(20mins)</label
          >
          <label
            ><input type="radio" name="method" value="car" />Car(35mins)</label
          >
          <label
            ><input
              type="radio"
              name="method"
              value="pickup"
            />Pick-up(15mins)</label
          >
        </fieldset>

        <fieldset>
          <legend>Delivery Options</legend>

          <label>
            <input type="checkbox" name="door" value="chosen" />
            Leave at the door
          </label>

          <label>
            <input type="checkbox" name="hand" value="chosen" />
            Hand to Me
          </label>

          <label>
            <input type="checkbox" name="call" value="chosen" />
            Call When Arrived
          </label>

          <label>
            <input type="checkbox" name="text" value="chosen" />
            Text When Arrived
          </label>

          <label>
            <input type="checkbox" name="doorbell" value="chosen" />
            Ring Doorbell
          </label>

          <label>
            Preferred Delivery Time
            <select name="time">
              <option value="none">Please Select</option>
              <option value="now">ASAP</option>
              <option value="30min">In 30 minutes</option>
              <option value="1hr">In 1 hour</option>
            </select>
          </label>
        </fieldset>

        <label
          >Comments
          <textarea
            name="comments"
            placeholder="Please add any special instruction"
          ></textarea>
        </label>

        <input type="submit" value="Submit Delivery Request" />
      </form>
    </main>

    <!-- start the page footer -->
    <footer>
      <p>
        &copy;2026 &bull; Drone Delivery Services &bull;
        <a href="mailto:zen@gmail.com">Email Us</a>
      </p>
    </footer>
  </body>
</html>

  <legend>Delivery Options</legend>
